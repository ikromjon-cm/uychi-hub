name: Keep Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://uychi-hub-backend-production.up.railway.app/api/health/)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Backend is down!"
            exit 1
          fi
          echo "Backend is alive ✓"
