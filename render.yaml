services:
  - type: web
    name: uychi-hub-api
    runtime: python
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: uychi-hub-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "uychi-hub-api.onrender.com,uychi.uz,www.uychi.uz"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://uychi-hub.vercel.app,https://uychi.uz,https://www.uychi.uz"
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: "info@uychi.uz"

databases:
  - name: uychi-hub-db
    databaseName: uychi_hub
    user: uychi_hub_user
    plan: free
